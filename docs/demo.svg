<svg xmlns="http://www.w3.org/2000/svg" width="720" height="460">
  <style>
    .bg { fill: #1e1e2e; }
    .title-bar { fill: #313244; }
    .btn-r { fill: #f38ba8; }
    .btn-y { fill: #f9e2af; }
    .btn-g { fill: #a6e3a1; }
    .prompt { fill: #89b4fa; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
    .cmd { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
    .output { fill: #a6adc8; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
    .success { fill: #a6e3a1; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
    .comment { fill: #6c7086; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
    .highlight { fill: #f9e2af; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
    .cursor { fill: #cdd6f4; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    .line { opacity: 0; }
    .line1 { animation: appear 0.3s 0.5s forwards; }
    .line2 { animation: appear 0.3s 1.0s forwards; }
    .line3 { animation: appear 0.3s 1.5s forwards; }
    .line4 { animation: appear 0.3s 2.2s forwards; }
    .line5 { animation: appear 0.3s 2.7s forwards; }
    .line6 { animation: appear 0.3s 3.2s forwards; }
    .line7 { animation: appear 0.3s 3.5s forwards; }
    .line8 { animation: appear 0.3s 4.2s forwards; }
    .line9 { animation: appear 0.3s 4.7s forwards; }
    .line10 { animation: appear 0.3s 5.2s forwards; }
    .line11 { animation: appear 0.3s 5.5s forwards; }
    .line12 { animation: appear 0.3s 6.2s forwards; }
    .line13 { animation: appear 0.3s 6.7s forwards; }
    .line14 { animation: appear 0.3s 7.0s forwards; }
    .line15 { animation: appear 0.3s 7.5s forwards; }
    .line16 { animation: appear 0.3s 8.0s forwards; }

    @keyframes appear { to { opacity: 1; } }
  </style>

  <!-- Terminal window -->
  <rect class="bg" width="720" height="460" rx="10" />
  <rect class="title-bar" width="720" height="32" rx="10" />
  <rect class="title-bar" width="720" height="16" y="16" />
  <circle class="btn-r" cx="20" cy="16" r="6" />
  <circle class="btn-y" cx="40" cy="16" r="6" />
  <circle class="btn-g" cx="60" cy="16" r="6" />
  <text x="320" y="21" text-anchor="middle" fill="#a6adc8" font-family="'SF Mono', monospace" font-size="12">ff-kit demo</text>

  <!-- Line 1: install -->
  <g class="line line1">
    <text class="prompt" x="16" y="60">$</text>
    <text class="cmd" x="30" y="60">pip install ff-kit</text>
  </g>

  <!-- Line 2: install output -->
  <g class="line line2">
    <text class="success" x="16" y="80">Successfully installed ff-kit-0.1.0</text>
  </g>

  <!-- Line 3: comment -->
  <g class="line line3">
    <text class="comment" x="16" y="108"># Clip the first 30 seconds from a video</text>
  </g>

  <!-- Line 4: clip command -->
  <g class="line line4">
    <text class="prompt" x="16" y="128">$</text>
    <text class="cmd" x="30" y="128">ffkit clip raw.mp4 intro.mp4 --start 0 --duration 30</text>
  </g>

  <!-- Line 5: clip output -->
  <g class="line line5">
    <text class="success" x="16" y="148">Done: intro.mp4</text>
  </g>

  <!-- Line 6: comment -->
  <g class="line line6">
    <text class="comment" x="16" y="176"># Extract 16kHz mono WAV for Whisper/Paraformer</text>
  </g>

  <!-- Line 7: extract command -->
  <g class="line line7">
    <text class="prompt" x="16" y="196">$</text>
    <text class="cmd" x="30" y="196">ffkit extract-audio raw.mp4 speech.wav --codec pcm_s16le --sample-rate 16000</text>
  </g>

  <!-- Line 8: extract output -->
  <g class="line line8">
    <text class="success" x="16" y="216">Done: speech.wav</text>
  </g>

  <!-- Line 9: comment -->
  <g class="line line9">
    <text class="comment" x="16" y="244"># Print tool schemas for your LLM agent</text>
  </g>

  <!-- Line 10: list-tools -->
  <g class="line line10">
    <text class="prompt" x="16" y="264">$</text>
    <text class="cmd" x="30" y="264">ffkit list-tools --format openai | head -8</text>
  </g>

  <!-- Line 11-14: JSON output -->
  <g class="line line11">
    <text class="output" x="16" y="284">[{</text>
  </g>
  <g class="line line12">
    <text class="output" x="16" y="304">  "type": "function",</text>
  </g>
  <g class="line line13">
    <text class="output" x="16" y="324">  "function": {</text>
  </g>
  <g class="line line14">
    <text class="output" x="16" y="344">    "name": </text>
    <text class="highlight" x="118" y="344">"ffkit_clip"</text>
    <text class="output" x="210" y="344">,</text>
  </g>
  <g class="line line15">
    <text class="output" x="16" y="364">    "description": "Trim a segment from a media file..."</text>
  </g>

  <!-- Line 16: final prompt -->
  <g class="line line16">
    <text class="prompt" x="16" y="400">$</text>
    <rect class="cursor" x="30" y="389" width="8" height="16" />
  </g>
</svg>
